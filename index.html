<!DOCTYPE html>
<html>
<head>
<title>Drug Interaction Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    color: white;
    text-align: center;
    padding: 20px;
    margin: 0;
}

.container {
    background: rgba(144, 238, 144, 0.85); /* light green */
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
}
.high { background: red; }
.moderate { background: orange; }
.low { background: green; }
.ai { background: blue; }
    #bgVideo {
    position: fixed;   
    right: 0;
    bottom: 0;
    min-width: 100%;   
    min-height: 100%;  
    z-index: -1;      
    object-fit: cover; 
    filter: brightness(40%);
    }
</style>
</head>

<body>
<video autoplay muted loop id="bgVideo">
<source src="bg.mp4" type="video/mp4">
</video>

<h1>💊 Drug Interaction Checker</h1>

<div class="container">
    <input list="drugs" id="drug1" placeholder="Enter Drug 1">
<input list="drugs" id="drug2" placeholder="Enter Drug 2">
 <datalist id="drugs"></datalist> 
    <input type="file" id="camera" accept="image/*" capture="environment">
<button onclick="scan()">📷 Scan Prescription</button>
<button onclick="check()">Check Interaction</button>

    <div id="result" class="result"></div>
</div>

<script>
async function check() {
    let d1 = document.getElementById("drug1").value;
    let d2 = document.getElementById("drug2").value;

    let box = document.getElementById("result");
    box.innerHTML = "⏳ Loading...";

    try {
        let res = await fetch("https://drug-api-1-gttd.onrender.com/check?drug1=" + d1 + "&drug2=" + d2);
        let data = await res.json();

        // 🔥 Professional UI result
        box.innerHTML = `<h3>${data.severity}</h3><p>${data.message}</p>`;

        if(data.severity.toLowerCase().includes("high")) {
            box.className = "result high";
        }
        else if(data.severity.toLowerCase().includes("moderate")) {
            box.className = "result moderate";
        }
        else if(data.severity.toLowerCase().includes("low")) {
            box.className = "result low";
        }
        else {
            box.className = "result ai";
        }

    } catch (error) {
        box.innerHTML = "❌ Server error / Try again";
    }
}

// 🤖 AI Chat
async function send() {
    let input = document.getElementById("userInput").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p>🧑: " + input + "</p>";

    try {
        let res = await fetch("https://drug-api-1-gttd.onrender.com/ai?msg=" + input);
        let data = await res.json();

        chat.innerHTML += "<p>🤖: " + data.reply + "</p>";
    } catch (error) {
        chat.innerHTML += "<p>❌ AI error</p>";
    }
}
    async function scan() {
    let file = document.getElementById("camera").files[0];

    if (!file) {
        alert("Please select image");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);

    let res = await fetch("https://drug-api-1-gttd.onrender.com/scan", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    alert("Detected Drugs: " + data.drugs.join(", "));

    // Auto fill input
    document.getElementById("drug1").value = data.drugs[0] || "";
    document.getElementById("drug2").value = data.drugs[1] || "";
    }
async function loadDrugs() {
    async function loadDrugs() {
    try {
        let res = await fetch("./drugs.json"); // ✅ fixed path
        let drugs = await res.json();

        let list = document.getElementById("drugs");

        drugs.forEach(d => {
            let option = document.createElement("option");
            option.value = d;
            list.appendChild(option);
        });

        console.log("Loaded drugs:", drugs.length);

    } catch (error) {
        console.log("Error loading drugs:", error);
    }
    }
    let drugs = await res.json();

    let list = document.getElementById("drugs");

    drugs.forEach(d => {
        let option = document.createElement("option");
        option.value = d;
        list.appendChild(option);
    });
}
window.onload = loadDrugs;
</script>
    <div id="chatbox" style="
position: fixed;
right: 20px;
bottom: 20px;
width: 250px;
background: white;  /* 👈 white color */
color: black;       /* 👈 text visible */
padding: 10px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.3);
">
<h3>🥷 AI Ninja Assistant</h3>

<div id="chat" style="height:150px; overflow:auto; font-size:14px;"></div>

<input id="userInput" placeholder="Ask something..." style="width:100%; padding:5px;">
<button onclick="send()">Send</button>

</div>

</body>
</html>
