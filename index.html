<!DOCTYPE html>
<html>
<head>
<title>DrugAI Ultra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
}

/* 🔷 Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}
.logo {
  font-size: 22px;
  font-weight: bold;
}
.login {
  border: 1px solid #38bdf8;
  padding: 5px 15px;
  border-radius: 20px;
}

/* 🔷 Hero */
.hero {
  text-align: center;
  margin-top: 50px;
}
.hero h1 {
  font-size: 42px;
}
.hero p {
  color: #94a3b8;
}

/* 🔷 Glass Box */
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(56,189,248,0.2);
}

/* Inputs */
input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

/* Buttons */
button {
  padding: 12px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#0ea5e9);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* Result */
.result {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
}
.high { background:#7f1d1d; }
.moderate { background:#78350f; }
.low { background:#14532d; }
.ai { background:#1e40af; }

/* 🔷 Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 50px;
  flex-wrap: wrap;
}

.card {
  width: 250px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-10px);
}

/* 🤖 Chatbot */
.chatbox {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 270px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
}
#chat {
  height: 150px;
  overflow-y: auto;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">💊 DrugAI Ultra</div>
  <div class="login">Login</div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>AI Drug Interaction System</h1>
  <p>Check risks instantly using AI + OCR + Voice</p>
</div>

<!-- Main Box -->
<div class="container">
  <input id="drug1" placeholder="Drug 1">
  <input id="drug2" placeholder="Drug 2">
  <input type="file" id="camera">

  <button onclick="scan()">📷 Scan</button>
  <button onclick="check()">Check Interaction</button>

  <div id="result" class="result"></div>
</div>

<!-- Cards -->
<div class="cards">
  <div class="card">⚡ Real-time Drug Analysis</div>
  <div class="card">🤖 AI Explanation Engine</div>
  <div class="card">📷 Prescription Scanner</div>
</div>

<!-- Chatbot -->
<div class="chatbox">
<h3>🤖 AI Assistant</h3>
<div id="chat"></div>
<input id="userInput">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>
const BASE = "https://drug-api-1-gttd.onrender.com";

async function check() {
  let d1 = drug1.value;
  let d2 = drug2.value;

  let res = await fetch(`${BASE}/check?drug1=${d1}&drug2=${d2}`);
  let data = await res.json();

  let box = document.getElementById("result");
  box.innerHTML = `<h3>${data.severity}</h3><p>${data.message}</p>`;
}

async function send() {
  let msg = userInput.value;
  chat.innerHTML += `<p>🧑 ${msg}</p>`;

  let res = await fetch(`${BASE}/ai?msg=${msg}`);
  let data = await res.json();

  chat.innerHTML += `<p>🤖 ${data.reply}</p>`;
  speak(data.reply);
}

async function scan() {
  let file = camera.files[0];
  let form = new FormData();
  form.append("image", file);

  let res = await fetch(`${BASE}/scan`, { method:"POST", body:form });
  let data = await res.json();

  alert(data.drugs.join(", "));
}

function startVoice() {
  const r = new webkitSpeechRecognition();
  r.onresult = e => {
    userInput.value = e.results[0][0].transcript;
    send();
  };
  r.start();
}

function speak(text) {
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
</script>

</body>
</html>
