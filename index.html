<!DOCTYPE html>
<html>
<head>
<title>DrugAI Ultra Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: white;
  overflow-x: hidden;
}

/* 🔵 Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle,#38bdf8,transparent);
  animation: move 10s linear infinite;
  opacity: 0.1;
}
@keyframes move {
  0% {transform: translate(-50%,-50%);}
  50% {transform: translate(0,0);}
  100% {transform: translate(-50%,-50%);}
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}
.logo { font-size: 22px; }
.login {
  border: 1px solid #38bdf8;
  padding: 5px 15px;
  border-radius: 20px;
}

/* Hero */
.hero {
  text-align: center;
}
.hero h1 { font-size: 40px; }

/* Box */
.box {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* Input */
input { width: 90%; padding: 10px; margin: 5px; }

/* Button */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
}

/* Result */
.result { padding: 10px; margin-top: 10px; border-radius: 10px; }

/* Chat */
.chatbox {
  position: fixed;
  right: 10px;
  bottom: 10px;
  width: 260px;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
}
#chat { height: 120px; overflow: auto; }

/* Circle counter */
.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 8px solid #38bdf8;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 20px;
  animation: spin 5s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">💊 DrugAI Ultra</div>
  <div class="login">Login</div>
</div>

<div class="hero">
<h1>AI Medical Assistant</h1>
<p>24×7 Smart Drug Safety System</p>
</div>

<!-- 🔵 Circle counter -->
<div class="circle" id="counter">0%</div>

<!-- Drug Interaction -->
<div class="box">
<h3>Drug Interaction</h3>
<input id="drug1" placeholder="Drug 1">
<input id="drug2" placeholder="Drug 2">
<button onclick="check()">Check</button>
<div id="result"></div>
  <input type="file" id="camera" accept="image/*" capture="environment"> 
  <button onclick="scan()">📷 Scan Prescription</button> 
  <button onclick="check()">Check Interaction</button> 
  <div id="result" class="result"></div>
</div>

<!-- 🍎 Drug Food -->
<div class="box">
<h3>Drug + Food Interaction</h3>
<input id="foodDrug" placeholder="Drug">
<input id="food" placeholder="Food">
<button onclick="foodCheck()">Check</button>
<div id="foodResult"></div>
</div>

<!-- ⏰ Alarm -->
<div class="box">
<h3>Medicine Alarm</h3>
<input type="time" id="time">
<button onclick="setAlarm()">Set Alarm</button>
</div>

<!-- Contact -->
<div class="box">
<h3>Contact</h3>
<p>📞 +917999754531</p>
<p>📧 abdulrajik334t@gmail.com</p>
<p>🟢 24×7 Available</p>
</div>

<!-- Chatbot -->
<div class="chatbox">
<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<script>
const BASE="https://drug-api-1-gttd.onrender.com";

// Interaction
async function check(){
 let d1=drug1.value,d2=drug2.value;
 let res=await fetch(`${BASE}/check?drug1=${d1}&drug2=${d2}`);
 let data=await res.json();
 result.innerHTML=data.severity+"<br>"+data.message;
}

// Food interaction (simple AI)
function foodCheck(){
 let d=foodDrug.value;
 let f=food.value;
 foodResult.innerHTML="⚠️ "+d+" + "+f+" may interact. Avoid alcohol & grapefruit.";
}

// Chat
async function send(){
 let m=msg.value;
 chat.innerHTML+="<p>🧑 "+m+"</p>";
 let r=await fetch(`${BASE}/ai?msg=${m}`);
 let d=await r.json();
 chat.innerHTML+="<p>🤖 "+d.reply+"</p>";
}

// Voice
function voice(){
 let r=new webkitSpeechRecognition();
 r.onresult=e=>{msg.value=e.results[0][0].transcript;send();}
 r.start();
}

// Alarm
function setAlarm(){
 let t=document.getElementById("time").value;
 alert("Alarm set at "+t);
}

// Counter animation
let count=0;
setInterval(()=>{
 count=(count+5)%100;
 document.getElementById("counter").innerText=count+"%";
},200);
</script>

</body>
</html>
