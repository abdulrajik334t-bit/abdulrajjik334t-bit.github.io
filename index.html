<!DOCTYPE html>
<html>
<head>
<title>Drug AI System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: linear-gradient(135deg,#020617,#0f172a);
}

/* 🎥 Background video */
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
    object-fit: cover;
    filter: brightness(35%);
}

/* 🔷 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

/* 🔷 Hero Section */
.hero {
    text-align: center;
    margin-top: 40px;
}

.hero h1 {
    font-size: 32px;
}

.hero p {
    color: #94a3b8;
}

/* 🔷 Glass Container */
.container {
    margin: 30px auto;
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
}

/* Inputs */
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Buttons */
button {
    padding: 10px;
    margin: 5px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Result Box */
.result {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
}

.high { background: #7f1d1d; }
.moderate { background: #78350f; }
.low { background: #14532d; }
.ai { background: #1e40af; }

/* 🤖 Chatbot */
.chatbox {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 270px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
}

#chat {
    height: 150px;
    overflow-y: auto;
    font-size: 14px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="bg.mp4" type="video/mp4">
</video>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">💊 DrugAI Pro</div>
</div>

<!-- Hero -->
<div class="hero">
<h1>Smart Drug Interaction Checker</h1>
<p>AI + OCR + Voice Assistant</p>
</div>

<!-- Main Box -->
<div class="container">

<input list="drugs" id="drug1" placeholder="Enter Drug 1">
<input list="drugs" id="drug2" placeholder="Enter Drug 2">
<datalist id="drugs"></datalist>

<input type="file" id="camera" accept="image/*" capture="environment">

<button onclick="scan()">📷 Scan</button>
<button onclick="check()">Check</button>

<div id="result" class="result"></div>

</div>

<!-- 🤖 Chatbot -->
<div class="chatbox">
<h3>🤖 AI Assistant</h3>

<div id="chat"></div>

<input id="userInput" placeholder="Ask anything...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>
const BASE = "https://drug-api-1-gttd.onrender.com";

// 🔥 Check interaction
async function check() {
    let d1 = document.getElementById("drug1").value;
    let d2 = document.getElementById("drug2").value;

    let box = document.getElementById("result");
    box.innerHTML = "⏳ Checking...";

    try {
        let res = await fetch(`${BASE}/check?drug1=${d1}&drug2=${d2}`);
        let data = await res.json();

        box.innerHTML = `<h3>${data.severity}</h3><p>${data.message}</p>`;

        if(data.severity.toLowerCase().includes("high")) box.className="result high";
        else if(data.severity.toLowerCase().includes("moderate")) box.className="result moderate";
        else if(data.severity.toLowerCase().includes("low")) box.className="result low";
        else box.className="result ai";

    } catch {
        box.innerHTML = "❌ Error";
    }
}

// 🤖 AI Chat
async function send() {
    let input = document.getElementById("userInput");
    let chat = document.getElementById("chat");

    let msg = input.value;
    chat.innerHTML += `<p>🧑: ${msg}</p>`;

    let res = await fetch(`${BASE}/ai?msg=${msg}`);
    let data = await res.json();

    chat.innerHTML += `<p>🤖: ${data.reply}</p>`;
    speak(data.reply);

    input.value="";
}

// 📷 Scan
async function scan() {
    let file = document.getElementById("camera").files[0];
    if(!file) return alert("Select image");

    let form = new FormData();
    form.append("image", file);

    let res = await fetch(`${BASE}/scan`, {
        method:"POST",
        body:form
    });

    let data = await res.json();

    alert("Detected: "+data.drugs.join(", "));
    document.getElementById("drug1").value = data.drugs[0]||"";
    document.getElementById("drug2").value = data.drugs[1]||"";
}

// 🎤 Voice
function startVoice() {
  const r = new webkitSpeechRecognition();
  r.onresult = e => {
    document.getElementById("userInput").value = e.results[0][0].transcript;
    send();
  };
  r.start();
}

// 🔊 Speak
function speak(text) {
  let s = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(s);
}
</script>

</body>
</html>
